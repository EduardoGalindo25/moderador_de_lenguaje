<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderador de Comentarios Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1117;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2d36; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3d4049; }

        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }

        /* Typing indicator */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* User bubble */
        .bubble-user {
            background-color: #1d4ed8;
            border-radius: 18px 18px 4px 18px;
        }

        /* Bot bubble */
        .bubble-bot {
            background-color: #1e2130;
            border: 1px solid #2a2d3e;
            border-radius: 18px 18px 18px 4px;
        }

        /* Input area */
        .input-area {
            background-color: #181b27;
            border: 1px solid #2a2d3e;
        }
        .input-area:focus-within {
            border-color: #1d4ed8;
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Chat Window -->
    <div class="w-full max-w-3xl h-[88vh] rounded-2xl flex flex-col overflow-hidden" style="background-color:#13161f; border: 1px solid #1e2130;">

        <!-- Header -->
        <div class="px-6 py-4 flex justify-between items-center" style="background-color:#0f1117; border-bottom: 1px solid #1e2130;">
            <div class="flex items-center gap-3">
                <!-- Icon -->
                <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background-color:#1d4ed8;">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-white tracking-wide">ModAI Bot</h1>
                    <p class="text-xs text-gray-500" id="status-text">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 mr-1"></span>
                        En línea
                    </p>
                </div>
            </div>
            <!-- Message counter -->
            <div class="text-xs font-semibold px-3 py-1.5 rounded-lg" style="background-color:#1e2130; color:#94a3b8; border: 1px solid #2a2d3e;">
                Mensaje <span id="msg-counter" class="text-white">{{ message_count }}</span><span class="text-gray-600">/10</span>
            </div>
        </div>

        <!-- Chat History -->
        <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-6 space-y-5 flex flex-col">
            <!-- Welcome message -->
            <div class="flex items-end gap-2.5 self-start max-w-[80%] animate-fade-in">
                <div class="w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center mb-1" style="background-color:#1d4ed8;">
                    <span class="text-[10px] font-bold text-white">AI</span>
                </div>
                <div class="bubble-bot px-4 py-3">
                    <p class="text-sm text-gray-200 leading-relaxed">
                        ¡Hola! Soy tu asistente moderador inteligente. Charlemos un rato. Tienes 10 mensajes. 😊
                    </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-4 py-4" style="border-top: 1px solid #1e2130; background-color:#0f1117;">
            <form id="chat-form" class="flex items-end gap-3" onsubmit="event.preventDefault(); sendMessage();">
                <div class="flex-1 input-area rounded-xl overflow-hidden transition-colors duration-200">
                    <textarea
                        id="user-input"
                        rows="2"
                        class="w-full bg-transparent text-white px-4 py-3 focus:outline-none resize-none placeholder-gray-600 text-sm"
                        placeholder="Escribe tu mensaje... (Enter para enviar)"
                        autofocus
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); document.getElementById('chat-form').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true})); }"
                    ></textarea>
                </div>
                <button
                    type="submit"
                    id="send-btn"
                    class="h-11 w-11 rounded-xl flex items-center justify-center flex-shrink-0 transition-all duration-200 active:scale-95 hover:brightness-110"
                    style="background-color:#1d4ed8;"
                >
                    <svg class="w-4 h-4 text-white transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Final Report Modal -->
    <div id="report-overlay" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background-color: rgba(0,0,0,0.85);">
        <div id="report-modal"
             class="w-full max-w-xl max-h-[88vh] rounded-2xl p-7 overflow-y-auto shadow-2xl transition-all duration-300 scale-95 opacity-0"
             style="background-color:#13161f; border: 1px solid #1e2130;">

            <div class="flex items-center gap-3 mb-6">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background-color:#1d4ed8;">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h2 class="text-lg font-bold text-white">Reporte Final de Moderación</h2>
            </div>

            <div id="report-content" class="space-y-4"></div>

            <div class="mt-7 flex justify-end">
                <button onclick="window.location.reload()"
                        class="px-5 py-2 rounded-xl text-sm font-semibold text-white transition-all duration-200 hover:brightness-110"
                        style="background-color:#1d4ed8;">
                    Iniciar Nueva Sesión
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const msgCounter = document.getElementById('msg-counter');
        let currentMessages = parseInt('{{ message_count }}' || '0', 10);
        let isSessionOver = false;

        // --- Rendering Helpers ---
        function renderUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex items-end gap-2.5 self-end max-w-[80%] animate-fade-in justify-end";
            wrapper.innerHTML = `
                <div class="bubble-user px-4 py-3">
                    <p class="text-sm text-white leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
                </div>
            `;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function renderBotMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex items-end gap-2.5 self-start max-w-[80%] animate-fade-in";
            wrapper.innerHTML = `
                <div class="w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center mb-1" style="background-color:#1d4ed8;">
                    <span class="text-[10px] font-bold text-white">AI</span>
                </div>
                <div class="bubble-bot px-4 py-3">
                    <p class="text-sm text-gray-200 leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
                </div>
            `;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function renderTypingIndicator() {
            const id = 'typing-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = "flex items-end gap-2.5 self-start animate-fade-in";
            wrapper.innerHTML = `
                <div class="w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center mb-1" style="background-color:#1d4ed8;">
                    <span class="text-[10px] font-bold text-white">AI</span>
                </div>
                <div class="bubble-bot px-4 py-3.5 flex gap-1.5 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                </div>
            `;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // --- Report renderer ---
        function displayReport(reportJson) {
            const overlay = document.getElementById('report-overlay');
            const content = document.getElementById('report-content');
            let html = '';

            if (reportJson.evaluacion_redaccion) {
                const ev = reportJson.evaluacion_redaccion;
                const userCal = reportJson.calificacion_usuario || {};
                const stats = reportJson.estadisticas_vocabulario || {};

                const puntaje = userCal.puntaje || 0;
                const scoreColor = puntaje >= 70 ? '#22c55e' : puntaje >= 40 ? '#f59e0b' : '#ef4444';

                // Score card
                html += `
                <div class="flex items-center justify-between p-4 rounded-xl" style="background-color:#0f1117; border:1px solid #1e2130;">
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Clasificación</p>
                        <p class="text-base font-bold" style="color:${scoreColor}">${escapeHtml(userCal.clasificacion || '—')}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Puntaje Global</p>
                        <p class="text-4xl font-black" style="color:${scoreColor}">${puntaje}<span class="text-lg text-gray-600">/100</span></p>
                    </div>
                </div>
                `;

                // Evaluacion redaccion
                html += `
                <div class="p-4 rounded-xl" style="background-color:#0f1117; border:1px solid #1e2130;">
                    <div class="flex items-center justify-between mb-3">
                        <p class="text-sm font-semibold text-white">Evaluación de Redacción</p>
                        <span class="text-xs font-bold px-2 py-0.5 rounded-md" style="background-color:#1e2130; color:#94a3b8;">${ev.calificacion}/100</span>
                    </div>
                    <p class="text-sm text-gray-400 italic mb-3">"${escapeHtml(ev.comentario)}"</p>
                    <p class="text-xs text-gray-300 bg-blue-950 border border-blue-900 p-3 rounded-lg mb-4">
                        <span class="font-semibold text-blue-400 mr-1">Sugerencia:</span>${escapeHtml(ev.sugerencias)}
                    </p>
                    <div class="grid grid-cols-3 gap-2">
                        ${['ortografia','gramatica','claridad','coherencia','formalidad'].map(k => `
                        <div class="text-center p-2 rounded-lg" style="background-color:#1e2130;">
                            <span class="block text-[10px] text-gray-500 uppercase mb-0.5">${k}</span>
                            <span class="text-xs font-semibold text-gray-200">${escapeHtml(ev.desglose?.[k] || '—')}</span>
                        </div>`).join('')}
                    </div>
                </div>
                `;

                // Vocabulario
                html += `
                <div class="p-4 rounded-xl" style="background-color:#0f1117; border:1px solid #1e2130;">
                    <p class="text-sm font-semibold text-white mb-3">Estadísticas de Vocabulario</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-2">Palabras más usadas</p>
                    <div class="flex flex-wrap gap-1.5 mb-4">
                        ${(stats.palabras_mas_usadas || []).map(w => `
                        <span class="text-xs px-2.5 py-1 rounded-md text-gray-300" style="background-color:#1e2130; border:1px solid #2a2d3e;">${escapeHtml(w)}</span>
                        `).join('')}
                    </div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-2">Sentimiento General</p>
                    <div class="w-full h-2 rounded-full flex overflow-hidden" style="background-color:#1e2130;">
                        <div style="width:${stats.porcentaje_positivos||0}%; background-color:#1d4ed8;"></div>
                        <div style="width:${stats.porcentaje_neutrales||0}%; background-color:#374151;"></div>
                        <div style="width:${stats.porcentaje_negativos||0}%; background-color:#374151; opacity:0.5;"></div>
                    </div>
                    <div class="flex justify-between text-[10px] mt-1.5 text-gray-500">
                        <span class="text-blue-400">Positivo ${stats.porcentaje_positivos}%</span>
                        <span>Neutral ${stats.porcentaje_neutrales}%</span>
                        <span>Negativo ${stats.porcentaje_negativos}%</span>
                    </div>
                </div>
                `;
            } else {
                html = `<pre class="text-xs text-gray-300 p-3 rounded-lg overflow-x-auto" style="background-color:#0f1117;">${escapeHtml(JSON.stringify(reportJson, null, 2))}</pre>`;
            }

            content.innerHTML = html;

            overlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                const modal = document.getElementById('report-modal');
                modal.classList.remove('scale-95', 'opacity-0');
                modal.classList.add('scale-100', 'opacity-100');
            });
        }

        // --- Send message ---
        async function sendMessage() {
            if (isSessionOver) return;
            const text = userInput.value.trim();
            if (!text) return;

            renderUserMessage(text);
            userInput.value = '';
            setInputState(false);
            const typingId = renderTypingIndicator();

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                removeTypingIndicator(typingId);

                if (response.ok) {
                    currentMessages = data.message_count;
                    msgCounter.textContent = currentMessages;

                    if (data.is_final) {
                        isSessionOver = true;
                        document.getElementById('status-text').innerHTML = 'Sesión finalizada';
                        userInput.placeholder = "Chat cerrado.";
                        displayReport(data.reply);
                    } else {
                        renderBotMessage(data.reply);
                        setInputState(true);
                    }
                } else {
                    renderBotMessage((data.error || "Algo salió mal."));
                    setInputState(true);
                }
            } catch (err) {
                removeTypingIndicator(typingId);
                renderBotMessage("Error de conexión.");
                setInputState(true);
            }
        }

        function setInputState(enabled) {
            userInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            sendBtn.style.opacity = enabled ? '1' : '0.4';
            if (enabled) userInput.focus();
        }

        if (currentMessages >= 10) {
            isSessionOver = true;
            setInputState(false);
            userInput.placeholder = "Sesión Finalizada";
            document.getElementById('status-text').innerHTML = 'Sesión finalizada';
        }
    </script>
</body>
</html>
